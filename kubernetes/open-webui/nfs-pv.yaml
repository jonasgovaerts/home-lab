apiVersion: v1
kind: PersistentVolume
metadata:
  name: open-webui-nfs-pv
  labels:
    app: open-webui
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.3.100
    path: "/mnt/user/kubernetes/open-webui"
  mountOptions:
    - hard
    - nfsvers=4.1
