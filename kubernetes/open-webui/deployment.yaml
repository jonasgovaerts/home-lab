apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui
  namespace: open-webui
  labels:
    app: open-webui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui
  template:
    metadata:
      labels:
        app: open-webui
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:main
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Optional: Set custom port
            - name: PORT
              value: "8080"
            # Optional: Set custom host
            - name: HOST
              value: "0.0.0.0"
            # Optional: Set custom timeout
            - name: TIMEOUT
              value: "120"
          volumeMounts:
            - name: open-webui-storage
              mountPath: /app/backend/data
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
      volumes:
        - name: open-webui-storage
          persistentVolumeClaim:
            claimName: open-webui
