apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubernetes-mcp
  namespace: mcp
  annotations:
    # Traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # ExternalDNS
    external-dns.alpha.kubernetes.io/hostname: kubernetes-mcp.homelab.jonasg.be
    # cert-manager
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    # IMPORTANT: Argo CD expects HTTPS
    traefik.ingress.kubernetes.io/service.serversscheme: http
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - kubernetes-mcp.homelab.jonasg.be
    secretName: kubernetes-mcp-tls
  rules:
  - host: kubernetes-mcp.homelab.jonasg.be
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kubernetes-mcp-server
            port:
              number: 8000
