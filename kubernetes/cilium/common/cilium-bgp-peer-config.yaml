apiVersion: "cilium.io/v2"
kind: CiliumBGPPeerConfig
metadata:
  name: udm-pro
spec:
  ebgpMultihop: 4
  timers:
    connectRetryTimeSeconds: 5
    holdTimeSeconds: 90
    keepAliveTimeSeconds: 30
  gracefulRestart:
    enabled: true
    restartTimeSeconds: 15
  families:
    - afi: ipv4
      safi: unicast
      advertisements:
        matchLabels:
          bgp.cilium.io/advertise: "bgp"
