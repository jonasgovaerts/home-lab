apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  releaseName: traefik
  targetNamespace: traefik
  install:
    createNamespace: true
  interval: 5m
  chart:
    spec:
      chart: traefik
      version: 36.3.0
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  values:
    api:
      dashboard: true
      insecure: false
    metrics:
      prometheus:
        enabled: true
