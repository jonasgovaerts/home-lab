---
- name: Prepare all nodes
  hosts: masters,workers
  become: true
  tasks:
    - name: Disable swap
      ansible.builtin.command: swapoff -a
      when: ansible_facts["swaptotal_mb"] > 0
      changed_when: false
      failed_when: false

    - name: Remove swap from fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*swap.*)$'
        replace: '# \1'
      changed_when: false

    - name: Kernel modules
      ansible.builtin.copy:
        dest: /etc/modules-load.d/k8s.conf
        content: |
          overlay
          br_netfilter
        mode: '0644'

    - name: Load kernel modules
      community.general.modprobe:
        name: "{{ item }}"
      loop:
        - overlay
        - br_netfilter
      register: modprobe_result
      failed_when: modprobe_result is failed

    - name: Sysctl settings
      ansible.builtin.copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward = 1
        mode: '0644'

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Install base packages + NFS client
      ansible.builtin.apt:
        update_cache: true
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - nfs-common
          - containerd
        state: present

    - name: Create /etc/containerd directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: '0755'

    - name: Configure containerd
      ansible.builtin.shell: |
        containerd config default > /etc/containerd/config.toml
        sed -i 's/SystemdCgroup = false/SystemdCgroup = true/' /etc/containerd/config.toml
      args:
        creates: /etc/containerd/config.toml
      register: containerd_config
      failed_when: containerd_config.rc != 0

    - name: Restart containerd
      ansible.builtin.service:
        name: containerd
        state: restarted
        enabled: true
      changed_when: false

    - name: Set kubernetes version variable for APT
      ansible.builtin.set_fact:
        kubernetes_version_apt: "{{ kubernetes_version | regex_replace('^(\\d+\\.\\d+)\\..*$', '\\1') }}"

    - name: Add Kubernetes APT key
      # noqa command-instead-of-module risky-shell-pipe
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_apt }}/deb/Release.key \
        | gpg --dearmor --yes -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
      changed_when: false
      register: apt_key_result
      failed_when: apt_key_result.rc != 0

    - name: Add Kubernetes repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: |
          deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version_apt }}/deb/ /
        mode: '0644'

    - name: Install Kubernetes components
      ansible.builtin.apt:
        update_cache: true
        name:
          - kubelet={{ kubernetes_version }}-*
          - kubeadm={{ kubernetes_version }}-*
          - kubectl={{ kubernetes_version }}-*
        state: present
        allow_downgrade: true
      register: k8s_install
      failed_when: k8s_install is failed

    - name: Check if kubernetes components are installed
      ansible.builtin.command: dpkg -l | grep -E "(kubelet|kubeadm|kubectl)"
      changed_when: false
      register: k8s_check
      failed_when: false

    - name: Verify containerd is running
      ansible.builtin.command: systemctl is-active containerd
      changed_when: false
      register: containerd_status
      failed_when: containerd_status.rc != 0

    - name: Verify kubernetes components are installed
      ansible.builtin.command: kubelet --version
      changed_when: false
      register: kubelet_version
      failed_when: kubelet_version.rc != 0