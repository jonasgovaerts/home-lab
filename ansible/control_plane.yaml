- name: Initialize Kubernetes control plane
  hosts: masters[0]
  become: true
  tasks:
    - name: Create folder /etc/kubernetes/manifests
      ansible.builtin.file:
        mode: '0755'
        path: /etc/kubernetes/manifests
        state: directory
        validate: '%s is a directory'

    - name: Deploy kube-vip manifest
      ansible.builtin.template:
        src: kube-vip-bgp.yaml.j2
        dest: /etc/kubernetes/manifests/kube-vip.yaml
        validate: '%s is a file'

    - name: Template kubeadm config file
      ansible.builtin.template:
        src: kubeadm-config.yaml.j2
        dest: /etc/kubernetes/kubeadm-config.yaml
        validate: '%s is a file'

    - name: Initialize the Kubernetes cluster with kubeadm
      ansible.builtin.shell: |
        kubeadm init --config /etc/kubernetes/kubeadm-config.yaml --upload-certs
      args:
        creates: /etc/kubernetes/admin.conf
      register: kubeadm_init
      failed_when: kubeadm_init.rc != 0 and 'already exists' not in kubeadm_init.stderr

    - name: Create .kube directory on localhost
      become: false
      ansible.builtin.file:
        mode: '0755'
        path: ~/.kube
        state: directory
        validate: '%s is a directory'
      delegate_to: localhost

    - name: Fetch admin.conf to localhost
      ansible.builtin.fetch:
        src: /etc/kubernetes/admin.conf
        dest: ~/.kube/config
        flat: yes
        validate: '%s is a file'
    
    - name: Install Cillium CLI
      ansible.builtin.shell: |
        CILIUM_CLI_VERSION=$(curl -s https://raw.githubusercontent.com/cilium/cilium-cli/main/stable.txt)
        CLI_ARCH=amd64
        if [ "$(uname -m)" = "aarch64" ]; then CLI_ARCH=arm64; fi
        curl -L --fail --remote-name-all https://github.com/cilium/cilium-cli/releases/download/${CILIUM_CLI_VERSION}/cilium-linux-${CLI_ARCH}.tar.gz{,.sha256sum}
        sha256sum --check cilium-linux-${CLI_ARCH}.tar.gz.sha256sum
        tar xzvfC cilium-linux-${CLI_ARCH}.tar.gz /usr/local/bin
      changed_when: false
      args:
        creates: /usr/local/bin/cilium
      register: cilium_cli_install
      failed_when: cilium_cli_install.rc != 0

    - name: Install Cilium CNI
      environment:
        KUBECONFIG: /etc/kubernetes/admin.conf
      ansible.builtin.command: >
        cilium install --version {{ cilium_version }} \
          --helm-set kubeProxyReplacement=true \
          --helm-set k8sServiceHost={{ kubevip_address }} \
          --helm-set k8sServicePort=6443 \
          --helm-set ipam.mode=cluster-pool \
          --helm-set ipam.operator.clusterPoolIPv4PodCIDRList={{ pod_network_cidr }} \
          --helm-set ipam.operator.clusterPoolIPv4MaskSize=24 \
          --set bgpControlPlane.enabled=true \
          --set prometheus.enabled=true \
          --set operator.prometheus.enabled=true && \
          touch /etc/kubernetes/cilium_installed
      changed_when: false
      args:
        creates: /etc/kubernetes/cilium_installed
      register: cilium_install
      failed_when: cilium_install.rc != 0
      retries: 3
      delay: 10
