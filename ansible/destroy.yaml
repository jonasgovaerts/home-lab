---
- name: Reset Kubernetes cluster with kubeadm
  hosts: masters,workers
  become: yes
  tasks:
    - name: Reset kubeadm
      command: kubeadm reset --force
      ignore_errors: yes

    - name: Remove Cilium data
      ansible.builtin.file:
        state: absent
        path: "{{ item }}"
        mode: '0755'
      with_items:
        - /var/lib/cilium
        - /etc/cni/net.d
    
    -  name: reboot nodes
       ansible.builtin.reboot:
         reboot_timeout: 600
         pre_reboot_delay: 10
         post_reboot_delay: 30
         test_command: whoami
    
- name: Remove Cilium file
  hosts: masters[0]
  become: yes
  tasks:
    - name: Remove cilium file
      ansible.builtin.file:
        path: /etc/kubernetes/cilium_installed
        state: absent
