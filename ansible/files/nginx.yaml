apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: my-nginx-service
  annotations:
    # This tells Cilium exactly which IP to assign to this service
    lbipam.cilium.io/ips: "10.0.2.50"
  labels:
    app: nginx
    service.kubernetes.io/cilium-adverstised-bgp: "true"
spec:
  type: LoadBalancer
  ports:
    - port: 80
  selector:
    app: nginx
  externalTrafficPolicy: Cluster
